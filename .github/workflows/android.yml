name: Android Build Pipeline

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build Type (debug or release)'
        required: true
        default: 'debug'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Unzip
        run: sudo apt-get update && sudo apt-get install -y unzip

      - name: Unzip Android Project
        run: |
          # 1. Clean up old workspace files to prevent directory nesting bugs with 'mv' on subsequent runs
          # We preserve the workflow directory (.github) and the source project ZIP (project.zip)
          find . -maxdepth 1 ! -name '.' ! -name '.github' ! -name 'project.zip' -exec rm -rf {} + || true

          # 2. Extract the fresh ZIP module content
          mkdir -p extracted_project
          unzip -q project.zip -d extracted_project
          
          # Smart detection to adjust nested ZIP directories and lift elements
          cd extracted_project
          if [ -f gradlew ]; then
            echo "Project found at root of zip file."
            shopt -s dotglob
            mv * "$GITHUB_WORKSPACE" 2>/dev/null || true
            shopt -u dotglob
          else
            # Try to identify nested directory containing gradlew or build.gradle at any depth
            NESTED_DIR=$(find . -name "gradlew" -not -path "*/.*" | head -n 1)
            if [ -n "$NESTED_DIR" ]; then
              ACTUAL_DIR=$(dirname "$NESTED_DIR")
              echo "Project located in nested folder: $ACTUAL_DIR"
              cd "$ACTUAL_DIR"
              shopt -s dotglob
              mv * "$GITHUB_WORKSPACE" 2>/dev/null || true
              shopt -u dotglob
            else
              # Fallback: look for build.gradle at any depth
              BUILD_GRADLE=$(find . -name "build.gradle*" -not -path "*/.*" | head -n 1)
              if [ -n "$BUILD_GRADLE" ]; then
                ACTUAL_DIR=$(dirname "$BUILD_GRADLE")
                echo "Found build.gradle in nested folder: $ACTUAL_DIR"
                cd "$ACTUAL_DIR"
                shopt -s dotglob
                mv * "$GITHUB_WORKSPACE" 2>/dev/null || true
                shopt -u dotglob
              else
                echo "Standard Android elements not found at root, moving all root directory children to root."
                FIRST_SUBDIR=$(find . -maxdepth 1 -type d ! -name "." | head -n 1)
                if [ -n "$FIRST_SUBDIR" ]; then
                  cd "$FIRST_SUBDIR"
                  shopt -s dotglob
                  mv * "$GITHUB_WORKSPACE" 2>/dev/null || true
                  shopt -u dotglob
                fi
              fi
            fi
          fi
          cd "$GITHUB_WORKSPACE"
          rm -rf extracted_project project.zip
          
          # Clean execution permissions / generate wrapper if missing
          if [ -f gradlew ]; then
            chmod +x gradlew
          else
            echo "gradlew not found at workspace root. Generating standard Gradle Wrapper..."
            gradle wrapper || echo "Warn: Could not generate custom wrapper; fallback to system gradle."
            if [ -f gradlew ]; then
              chmod +x gradlew
            fi
          fi

      - name: Auto-Generate Missing Keystores
        shell: python
        run: |
          import os, sys, subprocess

          def extract_quoted(text, default=""):
              parts = text.replace('"', "'").split("'")
              for i in range(1, len(parts), 2):
                  val = parts[i].strip()
                  if val and '=' not in val:
                      return val
              return default

          print("Scanning for fallback debug.keystores...")
          if not os.path.exists("debug.keystore"):
              print("Generating debug.keystore in workspace root...")
              subprocess.run([
                  "keytool", "-genkey", "-v", "-keystore", "debug.keystore",
                  "-storepass", "android", "-alias", "androiddebugkey", "-keypass", "android",
                  "-keyalg", "RSA", "-keysize", "2048", "-validity", "10000",
                  "-dname", "CN=Android Debug,O=Android,C=US"
              ], stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)
          
          if os.path.isdir("app") and not os.path.exists("app/debug.keystore"):
              print("Generating debug.keystore in app/...")
              subprocess.run([
                  "keytool", "-genkey", "-v", "-keystore", "app/debug.keystore",
                  "-storepass", "android", "-alias", "androiddebugkey", "-keypass", "android",
                  "-keyalg", "RSA", "-keysize", "2048", "-validity", "10000",
                  "-dname", "CN=Android Debug,O=Android,C=US"
              ], stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)

          for root, dirs, files in os.walk('.'):
              if any(p in root for p in ['node_modules', '.git', '.gradle', 'build', 'extracted_project']):
                  continue
              for file in files:
                  if file.startswith('build.gradle'):
                      gradle_path = os.path.join(root, file)
                      try:
                          with open(gradle_path, 'r', encoding='utf-8', errors='ignore') as f:
                              content = f.read()
                          
                          for line in content.splitlines():
                              if 'storeFile' in line and 'file(' in line:
                                  parts = line.split('file(')
                                  if len(parts) > 1:
                                      inner = parts[1].split(')')[0]
                                      keystore_path = inner.replace('"', '').replace("'", "").strip()
                                      print("Found storeFile configure reference to:", keystore_path)
                                      
                                      if 'rootDir' in keystore_path or 'rootProject' in keystore_path:
                                          clean_name = keystore_path.replace('}', '').replace('{', '').replace('$', '').split('/')[-1]
                                          full_path = os.path.abspath(clean_name)
                                      elif keystore_path.startswith('/'):
                                          full_path = keystore_path
                                      else:
                                          full_path = os.path.abspath(os.path.join(root, keystore_path))
                                      
                                      if not os.path.exists(full_path):
                                          print("Keystore file is missing. Auto-generating debug signing credential:", full_path)
                                          os.makedirs(os.path.dirname(full_path), exist_ok=True)
                                          
                                          store_pass = "android"
                                          alias = "androiddebugkey"
                                          key_pass = "android"
                                          
                                          for pline in content.splitlines():
                                              if 'storePassword' in pline:
                                                  store_pass = extract_quoted(pline, "android")
                                              if 'keyAlias' in pline:
                                                  alias = extract_quoted(pline, "androiddebugkey")
                                              if 'keyPassword' in pline:
                                                  key_pass = extract_quoted(pline, "android")
                                          
                                          print("Generating custom keystore at:", full_path)
                                          subprocess.run([
                                              "keytool", "-genkey", "-v", "-keystore", full_path,
                                              "-storepass", store_pass, "-alias", alias, "-keypass", key_pass,
                                              "-keyalg", "RSA", "-keysize", "2048", "-validity", "10000",
                                              "-dname", "CN=Android Debug,O=Android,C=US"
                                          ], stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)
                      except Exception as e:
                          print("Error checking gradle file:", e)

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build with Gradle
        env:
          BUILD_TYPE: ${{ github.event.inputs.build_type }}
        run: |
          # Decide which task / wrapper tool to run
          if [ -f ./gradlew ]; then
            GRADLE_CMD="./gradlew"
          else
            echo "gradlew still missing at root. Falling back to the runner's system gradle."
            GRADLE_CMD="gradle"
          fi

          if [ "$BUILD_TYPE" = "release" ]; then
            $GRADLE_CMD assembleRelease
          else
            $GRADLE_CMD assembleDebug
          fi

      - name: Locate and Sign Build Artifacts
        run: |
          echo "Listing all generated .apk outputs:"
          find . -name "*.apk" || echo "No .apk found yet"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: |
            **/build/outputs/apk/**/*.apk
            **/build/outputs/bundle/**/*.aab
          if-no-files-found: error
