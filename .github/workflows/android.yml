name: Android Build Pipeline

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build Type (debug or release)'
        required: true
        default: 'debug'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Unzip
        run: sudo apt-get update && sudo apt-get install -y unzip

      - name: Unzip Android Project
        run: |
          # 1. Clean up old workspace files to prevent directory nesting bugs with 'mv' on subsequent runs
          # We preserve the workflow directory (.github) and the source project ZIP (project.zip)
          find . -maxdepth 1 ! -name '.' ! -name '.github' ! -name 'project.zip' -exec rm -rf {} + || true

          # 2. Extract the fresh ZIP module content
          mkdir -p extracted_project
          unzip -q project.zip -d extracted_project
          
          # Smart detection to adjust nested ZIP directories and lift elements
          cd extracted_project
          if [ -f gradlew ]; then
            echo "Project found at root of zip file."
            shopt -s dotglob
            mv * "$GITHUB_WORKSPACE" 2>/dev/null || true
            shopt -u dotglob
          else
            # Try to identify nested directory containing gradlew or build.gradle at any depth
            NESTED_DIR=$(find . -name "gradlew" -not -path "*/.*" | head -n 1)
            if [ -n "$NESTED_DIR" ]; then
              ACTUAL_DIR=$(dirname "$NESTED_DIR")
              echo "Project located in nested folder: $ACTUAL_DIR"
              cd "$ACTUAL_DIR"
              shopt -s dotglob
              mv * "$GITHUB_WORKSPACE" 2>/dev/null || true
              shopt -u dotglob
            else
              # Fallback: look for build.gradle at any depth
              BUILD_GRADLE=$(find . -name "build.gradle*" -not -path "*/.*" | head -n 1)
              if [ -n "$BUILD_GRADLE" ]; then
                ACTUAL_DIR=$(dirname "$BUILD_GRADLE")
                echo "Found build.gradle in nested folder: $ACTUAL_DIR"
                cd "$ACTUAL_DIR"
                shopt -s dotglob
                mv * "$GITHUB_WORKSPACE" 2>/dev/null || true
                shopt -u dotglob
              else
                echo "Standard Android elements not found at root, moving all root directory children to root."
                FIRST_SUBDIR=$(find . -maxdepth 1 -type d ! -name "." | head -n 1)
                if [ -n "$FIRST_SUBDIR" ]; then
                  cd "$FIRST_SUBDIR"
                  shopt -s dotglob
                  mv * "$GITHUB_WORKSPACE" 2>/dev/null || true
                  shopt -u dotglob
                fi
              fi
            fi
          fi
          cd "$GITHUB_WORKSPACE"
          rm -rf extracted_project project.zip
          
          # Clean execution permissions / generate wrapper if missing
          if [ -f gradlew ]; then
            chmod +x gradlew
          else
            echo "gradlew not found at workspace root. Generating standard Gradle Wrapper..."
            gradle wrapper || echo "Warn: Could not generate custom wrapper; fallback to system gradle."
            if [ -f gradlew ]; then
              chmod +x gradlew
            fi
          fi

      - name: Auto-Generate Missing Keystores
        run: |
          echo "Scanning for referenced keystores/JKS files..."
          grep -rnE ".keystore|.jks" . --exclude-dir=node_modules || true
          
          # Generate fallback debug.keystore at typical locations
          if [ ! -f debug.keystore ]; then
            echo "Generating fallback debug.keystore at workspace root..."
            keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US" || true
          fi
          
          if [ -d app ] && [ ! -f app/debug.keystore ]; then
            echo "Generating fallback debug.keystore in app/..."
            keytool -genkey -v -keystore app/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US" || true
          fi

          # Search for custom paths in build.gradle files and generate them
          find . -name "build.gradle*" | while read -r gradle_file; do
            dir=$(dirname "$gradle_file")
            grep -ioE "storeFile\s*=?\s*file\(["'][^"']+"" "$gradle_file" | sed -E 's/.*file\(["']([^"']+)["']/\1/' | while read -r keystore_path; do
              full_path="$dir/$keystore_path"
              if [[ "$keystore_path" == /* ]]; then
                full_path="$keystore_path"
              elif [[ "$keystore_path" == *rootProject* ]] || [[ "$keystore_path" == *rootDir* ]]; then
                clean_name=$(basename "$keystore_path")
                full_path="$GITHUB_WORKSPACE/$clean_name"
              fi
              
              if [ ! -f "$full_path" ]; then
                echo "Required keystore path matches referenced config: $full_path. Generating debug-grade keystore..."
                mkdir -p "$(dirname "$full_path")"
                
                # Fetch configured passwords if customized, fallback to 'android'
                p_store=$(grep -i "storePassword" "$gradle_file" | head -n 1 | sed -E 's/.*["''']([^"''']+)["'''].*/\1/' || echo "android")
                if [ -z "$p_store" ] || [[ "$p_store" == *storePassword* ]]; then p_store="android"; fi
                
                alias_name=$(grep -i "keyAlias" "$gradle_file" | head -n 1 | sed -E 's/.*["''']([^"''']+)["'''].*/\1/' || echo "androiddebugkey")
                if [ -z "$alias_name" ] || [[ "$alias_name" == *keyAlias* ]]; then alias_name="androiddebugkey"; fi
                
                p_key=$(grep -i "keyPassword" "$gradle_file" | head -n 1 | sed -E 's/.*["''']([^"''']+)["'''].*/\1/' || echo "android")
                if [ -z "$p_key" ] || [[ "$p_key" == *keyPassword* ]]; then p_key="android"; fi
                
                echo "Generating keystore with: file='$full_path', alias='$alias_name'"
                keytool -genkey -v -keystore "$full_path" -storepass "$p_store" -alias "$alias_name" -keypass "$p_key" -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US" || true
              fi
            done
          done

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build with Gradle
        env:
          BUILD_TYPE: ${{ github.event.inputs.build_type }}
        run: |
          # Decide which task / wrapper tool to run
          if [ -f ./gradlew ]; then
            GRADLE_CMD="./gradlew"
          else
            echo "gradlew still missing at root. Falling back to the runner's system gradle."
            GRADLE_CMD="gradle"
          fi

          if [ "$BUILD_TYPE" = "release" ]; then
            $GRADLE_CMD assembleRelease
          else
            $GRADLE_CMD assembleDebug
          fi

      - name: Locate and Sign Build Artifacts
        run: |
          echo "Listing all generated .apk outputs:"
          find . -name "*.apk" || echo "No .apk found yet"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: |
            **/build/outputs/apk/**/*.apk
            **/build/outputs/bundle/**/*.aab
          if-no-files-found: error
